services:
  basis-server:
    image: 'ghcr.io/basisvr/basis-server:nightly'
    container_name: basis-server
    init: true
    restart: unless-stopped
    environment:
      SetPort: 4296
      HealthCheckPort: 10666
      PromethusPort: 1234
      PeerLimit: 1024
      EnableStatistics: true
      EnableConsole: false
      ApiEnabled: true
    ports:
      - '4296:4296/udp'
      - '10666:10666/tcp'
      - '10667:10667/tcp'
      - '1234:1234/tcp'
      - '4000:4000/tcp'
    volumes:
      - './initialresources:/app/initialresources:ro'
      - './config:/app/config'
      - './logs:/app/logs'
    healthcheck:
      test:
        - CMD
        - curl
        - '-f'
        - 'http://localhost:10666/health'
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 2s

  marusansi-basis-dashboard:
    build:
      context: .
    container_name: dashboard
    restart: unless-stopped
    network_mode: "service:basis-server"
    environment:
      PORT: 4000
      HEALTH_PORT: 10666
      API_URL_BASE: http://localhost:10667
      API_BEARER_TOKEN: test_api_key
    depends_on:
      basis-server:
        condition: service_healthy
